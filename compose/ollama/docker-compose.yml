services:
  ollama:
    image: ollama/ollama:latest
    container_name: dwh-ollama
    ports:
      - '31434:11434'
    tty: true
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    networks:
      - dwh-net
    # dns:
    #   - 192.168.1.10
    volumes:
      - /opt/dwh/volumes/ollama:/root/.ollama
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:11434/api/tags']
      interval: 30s
      timeout: 10s
      retries: 3