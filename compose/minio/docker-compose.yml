services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: dwh-minio
    networks:
      - dwh-net
    ports:
      - '39200:9000'  # API Port
      - '39201:9001'  # Console/Web UI Port
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes:
      - dwh-s3-data:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  dwh-s3-data:
    name: dwh-s3-data
