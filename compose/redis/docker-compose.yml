services:
  dwh-rd-1:
    image: redis:alpine3.23
    container_name: dwh-rd-1
    restart: unless-stopped
    networks:
      - dwh-net
    ports:
      - '36379:6379'
    command: redis-server --save "" --appendonly no --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - dwh-rd-1-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  dwh-rd-insight:
    image: redis/redisinsight:latest
    container_name: dwh-rd-insight
    ports:
      - '35540:5540'
    networks:
      - dwh-net

volumes:
  dwh-rd-1-data:
    name: dwh-rd-1-data
    external: true
